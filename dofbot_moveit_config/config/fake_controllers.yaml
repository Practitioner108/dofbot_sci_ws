controller_list:
  - name: fake_arm_controller
    type: $(arg execution_type)
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
  - name: fake_gripper_controller
    type: $(arg execution_type)
    joints:
      - left_finger_joint
initial:  # Define initial robot poses.
  - group: arm
    pose: home
  - group: gripper
    pose: home_gripper